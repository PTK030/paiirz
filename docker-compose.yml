version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - SECRET_KEY=dockersecret12345
      - FLASK_DEBUG=True
      - CORS_ALLOWED_ORIGINS=*
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
